<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator PRO | jckswebapps</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f8f9fa; color: #212529; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #0d6efd; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #dee2e6; border-radius: 10px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #0d6efd; }
        canvas { background: white; padding: 10px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; width: 250px; height: 250px;}
        .buttons { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 10px; background: #0d6efd; color: white; font-weight: 600; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #0a58ca; }
        .footer-text { margin-top: 30px; font-size: 14px; color: #6c757d; max-width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <h1>QR Generator PRO</h1>
    <input type="text" id="qr-input" placeholder="Incolla l'URL qui..." oninput="generateQR()">
    
    <canvas id="qr-canvas"></canvas>

    <div class="buttons">
        <button onclick="downloadQR()">Scarica QR Code (PNG)</button>
    </div>
</div>

<p class="footer-text">
    Genera codici ad alta risoluzione per le tue schede tecniche. Il formato è ottimizzato per la stampa su materiali tecnici.
</p>

<script>
    // Inizializziamo il generatore sul canvas
    const qr = new QRious({
        element: document.getElementById('qr-canvas'),
        size: 1000,
        level: 'H', // Alta resistenza agli errori
        value: 'https://jckswebapps.github.io'
    });

    function generateQR() {
        const val = document.getElementById('qr-input').value;
        if (val.trim() !== "") {
            qr.value = val;
        }
    }

    function downloadQR() {
        const canvas = document.getElementById('qr-canvas');
        const url = document.getElementById('qr-input').value;
        
        if (!url) {
            alert("Per favore, inserisci prima un URL!");
            return;
        }

        // Creiamo un link temporaneo per il download
        const link = document.createElement('a');
        link.download = 'qrcode-jckswebapps.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
