<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Vettoriale PRO | jckswebapps</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/kazuhikoarase-qrcode-generator/2.0.2/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f0f4f8; color: #2d3436; }
        .container { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 420px; width: 100%; }
        h1 { font-size: 26px; margin-bottom: 10px; color: #0984e3; }
        p.subtitle { color: #636e72; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 14px; margin-bottom: 25px; border: 2px solid #dfe6e9; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 16px; transition: all 0.3s; }
        input:focus { border-color: #0984e3; box-shadow: 0 0 0 4px rgba(9, 132, 227, 0.1); }
        #qr-container { background: white; padding: 15px; display: inline-block; border-radius: 12px; border: 1px solid #f1f2f6; margin-bottom: 25px; }
        .buttons { display: grid; grid-template-columns: 1fr; gap: 12px; }
        button { padding: 14px; cursor: pointer; border: none; border-radius: 12px; background: #0984e3; color: white; font-weight: 600; font-size: 16px; transition: transform 0.2s, background 0.2s; }
        button:hover { background: #074b83; transform: translateY(-2px); }
        button.secondary { background: #6c757d; }
        .vettore-tag { display: inline-block; background: #e1f5fe; color: #0288d1; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="vettore-tag">FORMATO VETTORIALE ATTIVO</div>
    <h1>QR Generator PRO</h1>
    <p class="subtitle">Genera file SVG pronti per la stampa professionale</p>
    
    <input type="text" id="qr-input" placeholder="Inserisci URL (es: https://google.com)" oninput="drawQR()">
    
    <div id="qr-container"></div>

    <div class="buttons">
        <button onclick="downloadSVG()">Scarica VETTORIALE (SVG)</button>
    </div>
</div>

<script>
    function drawQR() {
        const typeNumber = 0; // calcola automaticamente la densità
        const errorCorrectionLevel = 'H'; // Massima resistenza per la stampa
        const qr = qrcode(typeNumber, errorCorrectionLevel);
        const val = document.getElementById('qr-input').value || "https://jckswebapps.github.io";
        
        qr.addData(val);
        qr.make();
        
        // Genera il modulo SVG (celle di dimensione 8px)
        document.getElementById('qr-container').innerHTML = qr.createSvgTag(8, 0);
    }

    function downloadSVG() {
        const svgElement = document.querySelector('#qr-container svg');
        if (!svgElement) {
            alert("Inserisci un URL prima!");
            return;
        }

        // Estraiamo il codice sorgente dell'SVG
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const svgBlob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const svgUrl = URL.createObjectURL(svgBlob);
        
        const downloadLink = document.createElement("a");
        downloadLink.href = svgUrl;
        downloadLink.download = "qrcode-vettoriale-jcks.svg";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }

    // Disegna un codice di default all'avvio
    window.onload = drawQR;
</script>

</body>
</html>
