<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore QR Vettoriale | jckswebapps</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; }
        h1 { margin-top: 0; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; }
        #qrcode { margin: 20px auto; padding: 10px; background: #fff; display: inline-block; }
        #qrcode img, #qrcode canvas { display: block; margin: 0 auto; }
        .buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 24px; cursor: pointer; border: none; border-radius: 8px; background: #1a73e8; color: white; font-weight: bold; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
        .info { margin-top: 40px; max-width: 600px; color: #666; line-height: 1.6; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>QR Code Pro</h1>
    <p>Crea codici statici infiniti per le tue schede prodotto.</p>
    
    <input type="text" id="url" placeholder="Incolla l'URL (es. https://budomagazine.com)" onkeyup="updateQR()">
    
    <div id="qrcode"></div>

    <div class="buttons">
        <button onclick="downloadPNG()">Scarica Immagine (PNG)</button>
    </div>
</div>

<div class="info">
    <h3>Ottimizzato per la stampa</h3>
    <p>I codici generati sono compatibili con tutti i lettori e ideali per essere inseriti nei PDF delle schede tecniche del tatami.</p>
</div>

<script>
    // Inizializziamo il generatore
    var qrcode = new QRCode(document.getElementById("qrcode"), {
        text: "https://jckswebapps.github.io",
        width: 256,
        height: 256,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    // Funzione per aggiornare il QR mentre scrivi
    function updateQR() {
        var url = document.getElementById("url").value;
        if (url.trim() !== "") {
            qrcode.clear();
            qrcode.makeCode(url);
        }
    }

    // Funzione per scaricare il PNG (più compatibile con tutti i browser)
    function downloadPNG() {
        const img = document.querySelector('#qrcode img');
        const canvas = document.querySelector('#qrcode canvas');
        
        let dataURL;
        if (img && img.src && !img.src.startsWith('data:image/svg')) {
            dataURL = img.src;
        } else if (canvas) {
            dataURL = canvas.toDataURL("image/png");
        } else {
            alert("Inserisci un URL per generare il codice!");
            return;
        }

        const link = document.createElement("a");
        link.href = dataURL;
        link.download = "qrcode-jckswebapps.png";
        link.click();
    }
</script>

</body>
</html>
